<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LunchMap | 직장인 맛집 지도</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=1" />
</head>
<body>
  <canvas id="neural-bg" aria-hidden="true"></canvas>

  <div id="app">
  <header class="header">
    <a href="../index.html" class="header__home" aria-label="포트폴리오로 돌아가기">←</a>
    <div class="header__brand">
      <span class="header__logo">🍱</span>
      <h1>LunchMap</h1>
      <span class="header__tagline">어디서든 · 주변 맛집</span>
    </div>
    <div class="header__search">
      <input type="search" id="locationInput" placeholder="위치 입력 (역, 건물명, 주소 — 예: 강남역, IFC타워)..." autocomplete="off" />
      <button type="button" id="locationSearchBtn">주변 검색</button>
    </div>
    <div class="header__search header__search--secondary">
      <input type="search" id="keywordInput" placeholder="맛집명, 메뉴, 건물명..." />
      <button type="button" id="keywordSearchBtn">검색</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__label">검색 반경</div>
        <div class="sidebar__radius" id="radiusList">
          <button class="chip-btn" data-radius="1000">1km</button>
          <button class="chip-btn active" data-radius="1500">1.5km</button>
          <button class="chip-btn" data-radius="3000">3km</button>
          <button class="chip-btn" data-radius="5000">5km</button>
        </div>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__label">유형</div>
        <div class="sidebar__types" id="typeList"></div>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__label">필터</div>
        <div class="sidebar__filters">
          <label class="filter-chip">
            <input type="checkbox" id="soloOnlyFilter" />
            <span>🪑 혼밥 가능</span>
          </label>
          <label class="filter-chip">
            <input type="checkbox" id="verifiedOnlyFilter" />
            <span>✅ 직장인 인증</span>
          </label>
        </div>
      </div>
      <div class="sidebar__count" id="spotCount">맛집 0개</div>
      <ul class="sidebar__list" id="spotList"></ul>
    </aside>

    <main class="map-area">
      <div id="map"></div>
      <div id="mapSetup" class="map-setup hidden">
        <div class="map-setup__box">
          <button type="button" id="mapSetupClose" class="map-setup__close" aria-label="닫기">&times;</button>
          <h2>네이버 지도 인증 실패</h2>
          <p id="mapSetupReason" class="map-setup__reason"></p>
          <div class="map-setup__alert">
            NCP Web URL에 <code id="mapSetupPageUrl"></code> 를 추가하세요.
          </div>
          <p>Client ID: <code id="mapSetupClientId">-</code></p>
          <pre id="mapSetupUrls"></pre>
          <p>저장 후 <strong>Ctrl+Shift+R</strong> 새로고침</p>
        </div>
      </div>
    </main>

    <aside class="detail" id="detailPanel">
      <button class="detail__close" id="detailClose" aria-label="닫기">&times;</button>
      <div id="detailContent">
        <p class="detail__empty">위치를 검색한 뒤 맛집을 선택하세요</p>
      </div>
    </aside>
  </div>
  </div>

  <script src="../tooplate-neural-scripts.js"></script>
  <script src="js/app.js?v=1"></script>
</body>
</html>
